<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#FFFFFF" />
  <meta name="description" content="간격 반복 학습법으로 영단어를 효율적으로 암기하세요" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="단어카드" />
  <title>영단어 카드</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192.png" type="image/png" />
  <link rel="apple-touch-icon" href="icons/icon-512.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Gowun+Dodum&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- 헤더 -->
  <header class="app-header">
    <div class="header-inner">
      <a href="#home" class="app-title">영단어 카드</a>
      <div class="header-actions">
        <span class="sync-indicator" id="sync-indicator">
          <span class="sync-dot"></span>
          <span class="sync-text" id="sync-status-text"></span>
        </span>
        <button class="btn-icon" id="btn-quick-add" title="카드 빠른 추가" aria-label="카드 추가">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span>카드 추가</span>
        </button>
        <button class="btn-icon btn-menu" id="btn-hamburger" aria-label="메뉴" aria-expanded="false">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
      </div>
    </div>
  </header>

  <!-- 햄버거 드롭다운 메뉴 -->
  <div class="dropdown-menu" id="dropdown-menu" aria-hidden="true">
    <button class="dropdown-item" id="menu-export">
      <span class="dropdown-icon">📤</span> JSON 내보내기
    </button>
    <button class="dropdown-item" id="menu-import">
      <span class="dropdown-icon">📥</span> JSON 가져오기
    </button>
    <button class="dropdown-item" id="menu-sync">
      <span class="dropdown-icon">🔄</span> 동기화
    </button>
    <button class="dropdown-item" id="menu-settings">
      <span class="dropdown-icon">🔑</span> 비밀 키 설정
    </button>
    <input type="file" id="import-file-input" accept=".json" style="display:none" />
  </div>
  <div class="dropdown-overlay" id="dropdown-overlay"></div>

  <!-- 메인 콘텐츠 영역 -->
  <main class="app-main" id="app-main"></main>

  <!-- 모달: 덱 추가/수정 -->
  <div class="modal-overlay" id="modal-overlay" aria-hidden="true">
    <div class="modal" id="modal-deck" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">새 덱 만들기</h2>
        <button class="modal-close" id="modal-close" aria-label="닫기">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label" for="deck-name-input">덱 이름 <span class="required">*</span></label>
          <input type="text" id="deck-name-input" class="form-input" placeholder="예: TOEIC 단어장" maxlength="50" />
        </div>
        <div class="form-group">
          <label class="form-label" for="deck-desc-input">설명 (선택)</label>
          <input type="text" id="deck-desc-input" class="form-input" placeholder="예: 시험 대비용 핵심 단어 모음" maxlength="100" />
        </div>
        <div class="form-group" style="margin-bottom:0">
          <label class="form-label">덱 색상</label>
          <div class="color-swatches" id="color-swatches"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="modal-cancel">취소</button>
        <button class="btn btn-primary" id="modal-save">저장</button>
      </div>
    </div>
  </div>

  <!-- 모달: 학습 순서 설정 -->
  <div class="modal-overlay" id="study-modal-overlay" aria-hidden="true">
    <div class="modal" id="modal-study-order" role="dialog" aria-modal="true" aria-labelledby="study-modal-title">
      <div class="modal-header">
        <h2 class="modal-title" id="study-modal-title">학습 설정</h2>
        <button class="modal-close" id="study-modal-close" aria-label="닫기">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-group" style="margin-bottom:0">
          <label class="form-label">학습 순서</label>
          <div class="radio-group">
            <label class="radio-option">
              <input type="radio" name="study-order" value="random" id="order-random" />
              <div class="radio-text">
                <span class="radio-title">무작위</span>
                <span class="radio-desc">매번 다른 순서로 학습</span>
              </div>
            </label>
            <label class="radio-option">
              <input type="radio" name="study-order" value="oldest" id="order-oldest" />
              <div class="radio-text">
                <span class="radio-title">등록 순서</span>
                <span class="radio-desc">오래된 카드부터 차례로</span>
              </div>
            </label>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="study-modal-cancel">취소</button>
        <button class="btn btn-primary" id="study-modal-start">학습 시작</button>
      </div>
    </div>
  </div>

  <!-- 모달: 동기화 설정 -->
  <div class="modal-overlay" id="settings-modal-overlay" aria-hidden="true">
    <div class="modal" id="modal-settings" role="dialog" aria-modal="true" aria-labelledby="settings-modal-title">
      <div class="modal-header">
        <h2 class="modal-title" id="settings-modal-title">동기화 설정</h2>
        <button class="modal-close" id="settings-modal-close" aria-label="닫기">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-group" style="margin-bottom:0">
          <label class="form-label" for="input-sync-secret">동기화 비밀 키</label>
          <div class="sync-secret-row">
            <input type="password" id="input-sync-secret" class="form-input" placeholder="비밀 키를 입력하세요" autocomplete="off" />
            <button type="button" class="btn btn-ghost" id="btn-toggle-secret">표시</button>
          </div>
          <p class="form-hint">다른 앱과 동일한 비밀 키를 사용합니다. 이 기기에만 저장됩니다.</p>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="btn-clear-secret">키 삭제</button>
        <button class="btn btn-ghost" id="settings-modal-cancel">닫기</button>
        <button class="btn btn-primary" id="btn-save-secret">저장</button>
      </div>
    </div>
  </div>

  <!-- 토스트 알림 -->
  <div class="toast-container" id="toast-container" aria-live="polite"></div>

  <script src="app.js"></script>
</body>
</html>
